apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pensgame
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: pensgame-live-tls
      hosts:
        - pensgame.lol
  rules:
    - host: pensgame.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pensgame
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pensgame-www-redirect
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://pensgame.lol
    nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
spec:
  ingressClassName: nginx
  tls:
    - secretName: pensgame-www-tls
      hosts:
        - www.pensgame.lol
  rules:
    - host: www.pensgame.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pensgame
                port:
                  number: 80
